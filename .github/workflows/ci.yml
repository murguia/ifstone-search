name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build
        env:
          OPENAI_API_KEY: dummy-for-build
          # Build-time only: lib/db.ts requires DATABASE_URL at import. The build
          # never connects, so a placeholder is enough. Real value is in Vercel.
          DATABASE_URL: postgresql://build:build@localhost:5432/build
